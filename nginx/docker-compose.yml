services:
  nginx:
    build: .
    container_name: nginx
    network_mode: host
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul        
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./snippets:/etc/nginx/snippets
      - ./subdomains:/etc/nginx/subdomains

      # Persist Certbot data
      - certbot_conf:/etc/letsencrypt
      - /var/www:/var/www

    restart: unless-stopped

volumes:
  certbot_conf:
